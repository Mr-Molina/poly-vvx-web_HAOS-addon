<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Assistant Dashboard</title>
    <style>
      body,
      html {
        background-color: black;
        color: white;
      }
    </style>
  </head>
  <body>
    <table aria-label="Home Assistant Sensors">
      <tbody id="statsTable" aria-live="polite">
        <tr>
          <td colspan="2">Loading sensors...</td>
        </tr>
      </tbody>
    </table>
  </body>
  <script type="text/javascript">
    statsUpdate();
    setInterval(statsUpdate, 30 * 1000);

    function statsUpdate() {
        var stats = [];
        getData(function (data) {
            stats.push(data);
            var tbody = document.createElement('tbody');
            tbody.id = 'statsTable';
            tbody.setAttribute('aria-live', 'polite');
            if (stats[0].length === 0) {
                var tr = document.createElement('tr');
                var td = document.createElement('td');
                td.colSpan = 2;
                td.textContent = "No sensors found.";
                tr.appendChild(td);
                tbody.appendChild(tr);
            } else {
                stats[0].forEach(function(item, index, array) {
                    //console.log(item.friendly_name + " " + item.state_and_unit);
                    var tr = document.createElement('tr');
                    var tdName = document.createElement('td');
                    tdName.textContent = item.friendly_name;
                    var tdState = document.createElement('td');
                    tdState.textContent = item.state_and_unit;
                    tr.appendChild(tdName);
                    tr.appendChild(tdState);
                    tbody.appendChild(tr);
                });
            }
            var oldTbody = document.getElementById("statsTable");

            // ⚡ Bolt: Prevent unnecessary DOM rebuilds by updating existing rows
            // if the number of sensors hasn't changed, reducing CPU and GC overhead.
            var isErrorOrLoading = oldTbody.rows.length > 0 && oldTbody.rows[0].cells[0].colSpan > 1;
            if (!isErrorOrLoading && oldTbody.rows.length === stats[0].length) {
                stats[0].forEach(function(item, index) {
                    var row = oldTbody.rows[index];
                    if (row.cells[0].textContent !== item.friendly_name) {
                        row.cells[0].textContent = item.friendly_name;
                    }
                    if (row.cells[1].textContent !== item.state_and_unit) {
                        row.cells[1].textContent = item.state_and_unit;
                    }
                });
                return;
            }

            oldTbody.parentNode.replaceChild(tbody, oldTbody);
        });
    }

    // Ajax call to get json data from flask api endpoint
    function getData(callback) {
      var xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function () {
        if (xhr.readyState == 4) {
          if (xhr.status == 200) {
            var data = JSON.parse(xhr.responseText);
            callback(data);
          } else {
            callback([{"friendly_name": "Error", "state_and_unit": "Could not load sensors"}]);
          }
        }
      };
      xhr.open("GET", "/api", true);
      xhr.send();
    }
  </script>
</html>
